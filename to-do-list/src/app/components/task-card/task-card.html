<div class="task-card">
    <h3>{{ task.title }}</h3>
    <a [routerLink]="['/toDoDetail']" [queryParams]="{ id: task.id }">View Details</a>
    <button (click)="toggle.emit(task.id)">{{ task.completed ? 'Undo' : 'Complete' }}</button>
    <button (click)="delete.emit(task.id)">Delete</button>
</div>
