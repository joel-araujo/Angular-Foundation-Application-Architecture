<div class="card h-100 shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">
                {{ task.title }}
            </h5>
            <span class="badge" [ngClass]="task.completed ? 'bg-success' : 'bg-warning text-dark'">
                {{ task.completed ? 'Completed' : 'Pending' }}
            </span>
        </div>

        <hr>

        <div class="d-grid gap-2">
            <a class="btn btn-outline-primary" [routerLink]="['/toDoDetail']" [queryParams]="{ id: task.id }">View Details</a>

            <button class="btn" [ngClass]="task.completed ? 'btn-warning' : 'btn-success'" (click)="toggle.emit(task.id)">{{ task.completed ? 'Undo' : 'Complete' }}</button>

            <button class="btn btn-danger" (click)="delete.emit(task.id)">Delete</button>
        </div>
    </div>
</div>
